<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Material Calculator</h2>

<label>Customer Name</label>
<input type="text" id="customerName">

<label>Mobile</label>
<input type="text" id="mobile">

<label>Address</label>
<input type="text" id="address">

<label>Company</label>
<select id="company">
<option>KAI</option>
<option>BTA</option>
<option>EDF</option>
<option>ALFA</option>
<option>MAX</option>
</select>

<label>Series</label>
<select id="series">
<option>Sliding Window 3"</option>
<option>Sliding Window 4"</option>
<option>Fixed Window</option>
<option>Sliding Door</option>
<option>Casement Window</option>
</select>

<label>Glass Company</label>
<select id="glassCompany">
<option>Xinyi</option>
<option>PHP</option>
<option>Nasir</option>
<option>Bengal</option>
</select>

<label>Glass Thickness</label>
<select id="glassThickness">
<option>5 mm</option>
<option>5.5 mm</option>
<option>6 mm</option>
<option>8 mm</option>
<option>10 mm</option>
<option>12 mm</option>
</select>

<label>Glass Colour</label>
<select id="glassColour">
<option>Clear</option>
<option>Black</option>
<option>Blue</option>
<option>Green</option>
<option>Bronze</option>
<option>Reflective</option>
</select>

<label>Width (Inch)</label>
<input type="number" id="width">

<label>Height (Inch)</label>
<input type="number" id="height">

<label>Quantity</label>
<input type="number" id="qty" value="1">

<label>Hardware Cost</label>
<input type="number" id="hardware" value="0">

<label>Fittings Cost</label>
<input type="number" id="fittings" value="0">

<button onclick="calculateMaterial()">Calculate</button>

</div>

<script src="calculator.js"></script>

</body>
</html>

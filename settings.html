<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Settings</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Admin Settings</h2>

<hr>

<h3>Aluminium Rate</h3>

<label>Company</label>

<select id="company">

<option>KAI</option>
<option>BTA</option>
<option>EDF</option>
<option>ALFA</option>
<option>MAX</option>

</select>

<label>Series</label>

<select id="series">

<option>Sliding Window 3"</option>
<option>Sliding Window 4"</option>
<option>Fixed Window</option>
<option>Sliding Door</option>
<option>Casement Window</option>

</select>

<label>Aluminium Rate (Per Ft)</label>

<input type="number" id="aluRate">

<hr>

<h3>Glass Settings</h3>

<label>Glass Company</label>

<select id="glassCompany">

<option>Xinyi</option>
<option>PHP</option>
<option>Nasir</option>
<option>Bengal</option>

</select>

<label>Glass Thickness</label>

<select id="glassThickness">

<option>5 mm</option>
<option>5.5 mm</option>
<option>6 mm</option>
<option>8 mm</option>
<option>10 mm</option>
<option>12 mm</option>

</select>

<label>Glass Colour</label>

<select id="glassColour">

<option>Clear</option>
<option>Black</option>
<option>Blue</option>
<option>Green</option>
<option>Bronze</option>
<option>Reflective</option>

</select>

<label>Glass Rate (Per Sqft)</label>

<input type="number" id="glassRate">

<hr>

<h3>Labour & Profit</h3>

<label>Labour Rate</label>

<input type="number" id="labourRate">

<label>Profit %</label>

<input type="number" id="profit">

<button onclick="saveSettings()">

SAVE SETTINGS

</button>

</div>

<script src="settings.js"></script>

</body>
</html>

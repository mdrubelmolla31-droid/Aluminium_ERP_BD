<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Settings</h2>

<label>Company</label>
<select id="company">
<option>KAI</option>
<option>BTA</option>
<option>EDF</option>
<option>ALFA</option>
<option>MAX</option>
</select>

<label>Series</label>
<select id="series">
<option>Sliding Window 3"</option>
<option>Sliding Window 4"</option>
<option>Fixed Window</option>
<option>Sliding Door</option>
<option>Casement Window</option>
</select>

<label>Glass Company</label>
<select id="glassCompany">
<option>Xinyi</option>
<option>PHP</option>
<option>Nasir</option>
<option>Bengal</option>
</select>

<label>Glass Thickness</label>
<select id="glassThickness">
<option>5 mm</option>
<option>5.5 mm</option>
<option>6 mm</option>
<option>8 mm</option>
<option>10 mm</option>
<option>12 mm</option>
</select>

<label>Glass Colour</label>
<select id="glassColour">
<option>Clear</option>
<option>Black</option>
<option>Blue</option>
<option>Green</option>
<option>Bronze</option>
<option>Reflective</option>
</select>

<label>Aluminium Rate (৳/ft)</label>
<input type="number" id="aluRate">

<label>Glass Rate (৳/Sqft)</label>
<input type="number" id="glassRate">

<label>Labour Rate (৳/Sqft)</label>
<input type="number" id="labourRate">

<label>Profit (%)</label>
<input type="number" id="profit">

<button onclick="saveSettings()">Save Rate</button>

<h3>Saved Rates</h3>

<table border="1" width="100%">

<thead>

<tr>

<th>Company</th>
<th>Series</th>
<th>Glass</th>
<th>Thickness</th>
<th>Colour</th>
<th>Alu</th>
<th>Glass</th>
<th>Labour</th>
<th>Profit</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="rateBody">

</tbody>

</table>

</div>

<script src="settings.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>⚙️ Settings</h2>

<label>Company Name</label>
<input type="text" id="companyName">

<label>Phone</label>
<input type="text" id="phone">

<label>Address</label>
<input type="text" id="address">

<button onclick="saveSettings()">Save Settings</button>

<hr>

<div id="status"></div>

<br>

<a href="dashboard.html">⬅ Dashboard</a>

</div>

<script>

function saveSettings(){

let settings={
company:document.getElementById("companyName").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value
};

localStorage.setItem("erpSettings",JSON.stringify(settings));

document.getElementById("status").innerHTML="<h3>✅ Settings Saved</h3>";

}

window.onload=function(){

let s=JSON.parse(localStorage.getItem("erpSettings"));

if(s){

document.getElementById("companyName").value=s.company||"";
document.getElementById("phone").value=s.phone||"";
document.getElementById("address").value=s.address||"";

}

}

</script>

</body>
</html>

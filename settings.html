<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Rate Settings</h2>
  <hr>

<h3>Master Data</h3>

<label>New Company</label>
<input type="text" id="newCompany">
<button onclick="addCompany()">Add Company</button>

<label>New Series</label>
<input type="text" id="newSeries">
<button onclick="addSeries()">Add Series</button>

<label>New Aluminium Thickness</label>
<input type="text" id="newThickness">
<button onclick="addThickness()">Add Thickness</button>

<label>New Glass Company</label>
<input type="text" id="newGlassCompany">
<button onclick="addGlassCompany()">Add Glass Company</button>

<hr>

<label>Company</label>
<select id="company">
<option>KAI</option>
<option>BTA</option>
<option>EDF</option>
<option>ALFA</option>
<option>MAX</option>
</select>

<label>Series</label>
<select id="series">
<option>Sliding Window 3"</option>
<option>Sliding Window 4"</option>
<option>Fixed Window</option>
<option>Sliding Door</option>
<option>Casement Window</option>
</select>

<label>Aluminium Thickness</label>
<select id="aluThickness">
<option>1.0 mm</option>
<option>1.2 mm</option>
<option>1.4 mm</option>
<option>1.6 mm</option>
<option>1.8 mm</option>
<option>2.0 mm</option>
</select>

<label>Glass Company</label>
<select id="glassCompany">
<option>Xinyi</option>
<option>PHP</option>
<option>Nasir</option>
<option>Bengal</option>
</select>

<label>Glass Thickness</label>
<select id="glassThickness">
<option>5 mm</option>
<option>5.5 mm</option>
<option>6 mm</option>
<option>8 mm</option>
<option>10 mm</option>
<option>12 mm</option>
</select>

<label>Glass Colour</label>
<select id="glassColour">
<option>Clear</option>
<option>Black</option>
<option>Blue</option>
<option>Green</option>
<option>Bronze</option>
<option>Reflective</option>
</select>

  <label>Aluminium Rate (৳/ft)</label>
<input type="number" id="aluRate">

<label>Glass Rate (৳/Sqft)</label>
<input type="number" id="glassRate">

<label>Hardware Rate (৳/Sqft)</label>
<input type="number" id="hardwareRate">

<label>Fittings Rate (৳/Sqft)</label>
<input type="number" id="fittingsRate">

<label>Labour Rate (৳/Sqft)</label>
<input type="number" id="labourRate">

<label>Profit (%)</label>
<input type="number" id="profit">

<button onclick="saveSettings()">Save Rate</button>

<hr>

<h3>Saved Rate List</h3>

<table border="1" width="100%">

<thead>

<tr>

<th>Company</th>
<th>Series</th>
<th>Alu</th>
<th>Glass</th>
<th>Thick</th>
<th>Colour</th>
<th>Alu Rate</th>
<th>Glass</th>
<th>HW</th>
<th>Fit</th>
<th>Labour</th>
<th>Profit</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="rateBody">

</tbody>

</table>
</div>

<script src="settings.js"></script>

</body>

</html>
